services:
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: ota-mqtt-broker
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./passwd:/mosquitto/config/passwd:ro
      - mosquitto-data:/mosquitto/data
    ports:
      - "1883:1883"
    restart: unless-stopped

volumes:
  mosquitto-data:
