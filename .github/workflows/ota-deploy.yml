name: OTA Deploy via MQTT

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Select container image from GHCR packages'
        required: true
        type: choice
        options:
          - ghcr.io/pmt563/vs_bsr_zonal_x86
          - docker.io/library/nginx
          - docker.io/library/hello-world
      version:
        description: 'Image version/tag (leave blank to auto-detect latest)'
        required: false
        type: string
        default: ''
      target_device:
        description: 'Target edge device to deploy to'
        required: true
        type: choice
        options:
          - all-devices
          - device-tuan
          - device-huong
          - device-pi
      container_name:
        description: 'Container name on edge device (default: derived from image)'
        required: false
        type: string

env:
  MQTT_HOST: ${{ secrets.GCP_VM_HOST }}
  MQTT_USER: github-ci
  MQTT_PASS: ${{ secrets.MQTT_CI_PASSWORD }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - name: Set device matrix
        id: set-matrix
        run: |
          TARGET="${{ inputs.target_device }}"

          if [ "$TARGET" == "all-devices" ]; then
            MATRIX='[{"device_id":"device-tuan","tenant_id":"ota"},{"device_id":"device-huong","tenant_id":"ota1"},{"device_id":"device-pi","tenant_id":"ota"}]'
          elif [ "$TARGET" == "device-tuan" ]; then
            MATRIX='[{"device_id":"device-tuan","tenant_id":"ota"}]'
          elif [ "$TARGET" == "device-huong" ]; then
            MATRIX='[{"device_id":"device-huong","tenant_id":"ota1"}]'
          elif [ "$TARGET" == "device-pi" ]; then
            MATRIX='[{"device_id":"device-pi","tenant_id":"ota"}]'
          else
            echo "Unknown target device: $TARGET"
            exit 1
          fi

          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "Targets: ${MATRIX}"

      - name: Install skopeo
        run: sudo apt-get update && sudo apt-get install -y skopeo jq

      - name: Auto-detect latest image version
        id: detect
        run: |
          VERSION="${{ inputs.version }}"
          IMAGE="${{ inputs.image }}"

          if [ -z "$VERSION" ] || [ "$VERSION" == "latest" ]; then
            echo "Auto-detecting latest version for $IMAGE..."

            if [[ "$IMAGE" == ghcr.io/* ]]; then
              TAGS_JSON=$(skopeo list-tags --creds ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} docker://$IMAGE)
            else
              TAGS_JSON=$(skopeo list-tags docker://$IMAGE)
            fi

            LATEST_TAG=$(echo "$TAGS_JSON" | jq -r '.Tags[]' | grep -v -E 'latest|^v?0\.0\.0' | sort -V | tail -n 1)

            if [ -n "$LATEST_TAG" ]; then
              VERSION=$LATEST_TAG
              echo "Detected latest version: $VERSION"
            else
              echo "No semantic version found, falling back to 'latest'"
              VERSION="latest"
            fi
          else
            echo "Using provided version: $VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
  send-ota-command:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Install MQTT client
        run: sudo apt-get update && sudo apt-get install -y mosquitto-clients

      - name: "Deploy to ${{ matrix.target.device_id }}"
        id: payload
        run: |
          CONTAINER_NAME="${{ inputs.container_name }}"
          if [ -z "$CONTAINER_NAME" ]; then
            CONTAINER_NAME=$(echo "${{ inputs.image }}" | awk -F'/' '{print $NF}')
          fi

          DETECTED_VERSION="${{ needs.prepare.outputs.version }}"
          TENANT_ID="${{ matrix.target.tenant_id }}"
          DEVICE_ID="${{ matrix.target.device_id }}"

          CORRELATION_ID="gha-${{ github.run_id }}-${{ github.run_number }}-${DEVICE_ID}"
          ACTIVITY_ID="${CORRELATION_ID}"

          # Subject MUST be "um" for Suite Connector to route to Update Manager
          MQTT_TOPIC="command///req/${CORRELATION_ID}/um"

          # Ditto protocol envelope — topic field routes to the correct device
          PAYLOAD=$(cat <<EOF
          {
            "topic": "${TENANT_ID}/${DEVICE_ID}/things/live/messages/apply",
            "headers": {
              "content-type": "application/json",
              "correlation-id": "${CORRELATION_ID}",
              "response-required": false
            },
            "path": "/features/UpdateManager/inbox/messages/apply",
            "value": {
              "activityId": "${ACTIVITY_ID}",
              "desiredState": {
                "domains": [
                  {
                    "id": "containers",
                    "config": [],
                    "components": [
                      {
                        "id": "${CONTAINER_NAME}",
                        "version": "${DETECTED_VERSION}",
                        "config": [
                          {
                            "key": "image",
                            "value": "${{ inputs.image }}:${DETECTED_VERSION}"
                          }
                        ]
                      }
                    ]
                  }
                ]
              }
            }
          }
          EOF
          )

          echo "container_name=${CONTAINER_NAME}" >> "$GITHUB_OUTPUT"
          echo "mqtt_topic=${MQTT_TOPIC}" >> "$GITHUB_OUTPUT"
          echo "final_image=${{ inputs.image }}:${DETECTED_VERSION}" >> "$GITHUB_OUTPUT"
          echo "target=${DEVICE_ID}@${TENANT_ID}" >> "$GITHUB_OUTPUT"

          echo "$PAYLOAD" > /tmp/payload.json

          echo "Desired State for ${DEVICE_ID}:"
          cat /tmp/payload.json | python3 -m json.tool

          echo "Publishing to ${{ env.MQTT_HOST }}:1883"
          echo "Topic: ${MQTT_TOPIC}"
          echo "Target Device: ${DEVICE_ID} (tenant: ${TENANT_ID})"

          mosquitto_pub \
            -h "${{ env.MQTT_HOST }}" \
            -p 1883 \
            -u "${{ env.MQTT_USER }}" \
            -P "${{ env.MQTT_PASS }}" \
            -t "${MQTT_TOPIC}" \
            -f /tmp/payload.json

          echo "OTA command published to ${DEVICE_ID}!"

      - name: Summary
        if: always()
        run: |
          echo "## OTA Deploy → ${{ matrix.target.device_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ steps.payload.outputs.final_image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Container | \`${{ steps.payload.outputs.container_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Target Device | \`${{ steps.payload.outputs.target }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| MQTT Broker | \`${{ env.MQTT_HOST }}:1883\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Topic | \`${{ steps.payload.outputs.mqtt_topic }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
